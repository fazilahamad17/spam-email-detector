<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Spam Email Detector - Contact</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <!-- Header/Navbar -->
    <header>
        <div class="container navbar">
            <a href="/" class="logo">
                <span class="logo-icon">🛡️</span> AI Spam Detector
            </a>
            <ul class="nav-menu">
                <li><a href="/" class="nav-link">Home</a></li>
                <li><a href="/detector" class="nav-link">Spam Detector</a></li>
                <li><a href="/about" class="nav-link">About</a></li>
                <li><a href="/contact" class="nav-link active">Contact</a></li>
            </ul>
        </div>
    </header>

    <!-- Main Content -->
    <main>
        <div class="container">
            <div class="contact-wrapper animate-fade-in">
                <div class="contact-header">
                    <h1>Get In Touch</h1>
                    <p>Have questions about this mini project? Send a message below.</p>
                </div>

                <div class="card">
                    <!-- Success alert, hidden by default -->
                    <div id="success-alert" class="alert-success">
                        <strong>Success!</strong> Your message has been sent successfully.
                    </div>

                    <form id="contact-form">
                        <div class="form-group">
                            <label for="name" class="form-label">Full Name</label>
                            <input 
                                type="text" 
                                id="name" 
                                class="form-input" 
                                placeholder="Your Name" 
                                required
                            >
                        </div>
                        
                        <div class="form-group">
                            <label for="email" class="form-label">Email Address</label>
                            <input 
                                type="email" 
                                id="email" 
                                class="form-input" 
                                placeholder="name@example.com" 
                                required
                            >
                        </div>

                        <div class="form-group">
                            <label for="message" class="form-label">Message</label>
                            <textarea 
                                id="message" 
                                class="form-input form-textarea" 
                                placeholder="Write your message here..." 
                                required
                            ></textarea>
                        </div>

                        <button type="submit" class="btn btn-primary" style="width: 100%;">Send Message</button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <div class="container">
            <p>&copy; 2026 AI Spam Detector - Cyber Security Mini Project. All rights reserved.</p>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
